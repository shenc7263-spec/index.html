<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈深 - 工作空间站</title>
    <style>
        :root {
            --primary: #0088ff;
            --secondary: #00e5ff;
            --accent: #7b2ffd;
            --bg-start: #050a18;
            --bg-end: #0d1730;
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 136, 255, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        /* 动态粒子画布 */
        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        /* 主体布局容器 */
        .app-container {
            position: relative; z-index: 1; width: 100%; height: 100%; display: flex;
            background: url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h40v40H0z" fill="none"/><path d="M0 39.5h40M39.5 0v40" stroke="rgba(0,136,255,0.05)" stroke-width="1"/></svg>');
        }
        /* 侧边栏全息导航 */
        .sidebar {
            width: 260px; background: rgba(5, 10, 24, 0.8); backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border); padding: 30px 20px; display: flex; flex-direction: column;
            box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 24px; font-weight: bold; color: var(--secondary); text-shadow: 0 0 10px var(--secondary);
            margin-bottom: 40px; display: flex; align-items: center; gap: 10px; letter-spacing: 1px;
        }
        .nav-item {
            padding: 15px; margin-bottom: 15px; cursor: pointer; border-radius: 8px;
            color: var(--text-sub); transition: all 0.3s ease; border: 1px solid transparent;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--glass-bg); color: var(--text-main);
            border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 136, 255, 0.2);
            transform: translateX(5px);
        }
        /* 主内容区 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; animation: fadeIn 0.5s ease-out; }
        .section.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        /* 通用毛玻璃卡片 */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 12px; padding: 25px; margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0, 136, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover { box-shadow: inset 0 0 30px rgba(0, 136, 255, 0.1), 0 10px 40px rgba(0, 0, 0, 0.4); }
        .card-header { font-size: 18px; color: var(--secondary); margin-bottom: 20px; border-bottom: 1px solid rgba(0, 136, 255, 0.2); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        /* 仪表盘时钟与数据 */
        #clock { font-size: 54px; font-weight: bold; color: var(--text-main); text-shadow: 0 0 20px var(--primary); font-family: 'Courier New', Courier, monospace; letter-spacing: 2px;}
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-box { text-align: center; padding: 25px; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(0, 136, 255, 0.05); position: relative; overflow: hidden;}
        .stat-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--secondary)); animation: scanline 3s linear infinite; }
        @keyframes scanline { 0% { left: -100%; } 100% { left: 100%; } }
        .stat-num { font-size: 38px; color: var(--secondary); text-shadow: 0 0 15px var(--secondary); margin-top: 10px; font-weight: bold;}
        /* 表单与按钮 */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], select {
            flex: 1; padding: 12px 15px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--glass-border);
            color: var(--text-main); border-radius: 6px; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }
        .btn-glow {
            background: transparent; color: var(--secondary); border: 1px solid var(--secondary);
            padding: 10px 25px; border-radius: 6px; cursor: pointer; text-transform: uppercase;
            font-weight: bold; transition: 0.3s; outline: none; display: flex; align-items: center; gap: 5px;
        }
        .btn-glow:hover { background: var(--secondary); color: #000; box-shadow: 0 0 20px var(--secondary); }
        /* 列表样式 */
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .list-item:hover { background: rgba(0, 136, 255, 0.1); border-left: 3px solid var(--secondary); padding-left: 12px;}
        .tag-urgent { color: #ff4757; border: 1px solid #ff4757; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 10px; background: rgba(0,255,71,87,0.1);}
        .tag-normal { color: var(--secondary); border: 1px solid var(--secondary); padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 10px; background: rgba(0,229,255,0.1);}
        
        .action-btns { display: flex; gap: 15px; align-items: center; }
        .download-btn { color: var(--secondary); cursor: pointer; text-decoration: none; font-size: 14px; transition: 0.3s;}
        .download-btn:hover { text-shadow: 0 0 10px var(--secondary); transform: scale(1.05);}
        .delete-btn { color: var(--text-sub); cursor: pointer; font-size: 14px; transition: 0.3s;}
        .delete-btn:hover { color: #ff4757; }
        /* 文件上传区 */
        .upload-area {
            border: 2px dashed var(--glass-border); border-radius: 12px; padding: 50px; text-align: center;
            cursor: pointer; transition: 0.3s; background: rgba(0, 136, 255, 0.02); position: relative; overflow: hidden;
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--secondary); background: rgba(0, 229, 255, 0.05); box-shadow: inset 0 0 30px rgba(0,229,255,0.1);}
        .upload-icon { font-size: 40px; color: var(--secondary); margin-bottom: 15px; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span style="font-size: 28px;">⬢</span> 陈深工作空间站
            </div>
            <div class="nav-item active" onclick="switchTab('dashboard')">◱ 仪表盘主页</div>
            <div class="nav-item" onclick="switchTab('logs')">📝 每日工作记录</div>
            <div class="nav-item" onclick="switchTab('plans')">🎯 明日计划提醒</div>
            <div class="nav-item" onclick="switchTab('files')">📁 资料文件库</div>
        </aside>
        <main class="main-content">
            
            <section id="dashboard" class="section active">
                <div class="glass-card">
                    <div id="clock">00:00:00</div>
                    <p style="color: var(--text-sub); margin-top: 10px; font-size: 18px;" id="date-display">加载中...</p>
                </div>
                <div class="dashboard-grid">
                    <div class="stat-box">
                        <div class="card-header" style="border:none; justify-content:center;">累计工作记录</div>
                        <div class="stat-num" id="stat-logs">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="card-header" style="border:none; justify-content:center;">待办计划</div>
                        <div class="stat-num" id="stat-plans">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="card-header" style="border:none; justify-content:center;">本地文件数</div>
                        <div class="stat-num" id="stat-files">0</div>
                    </div>
                </div>
            </section>
            <section id="logs" class="section">
                <div class="glass-card">
                    <div class="card-header">新增工作记录</div>
                    <div class="input-group">
                        <input type="text" id="log-input" placeholder="输入今日完成的工作内容 (支持 Enter 快速保存)...">
                        <button class="btn-glow" onclick="addLog()">✦ 记录</button>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-header">历史归档检索</div>
                    <div id="log-list"></div>
                </div>
            </section>
            <section id="plans" class="section">
                <div class="glass-card">
                    <div class="card-header">制定明日计划</div>
                    <div class="input-group">
                        <select id="plan-priority" style="flex: 0.3;">
                            <option value="normal">普通优先级</option>
                            <option value="urgent">🔴 紧急任务</option>
                        </select>
                        <input type="text" id="plan-input" placeholder="输入待办任务内容...">
                        <button class="btn-glow" onclick="addPlan()">+ 添加</button>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="card-header">待办任务列表</div>
                    <div id="plan-list"></div>
                </div>
            </section>
            <section id="files" class="section">
                <div class="glass-card">
                    <div class="card-header">
                        <span>本地安全文件舱 (IndexedDB)</span>
                        <span style="font-size: 12px; color: var(--text-sub);">刷新不丢失，可随时下载</span>
                    </div>
                    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                        <div class="upload-icon">☁️</div>
                        <p style="font-size: 18px; color: #fff; margin-bottom: 8px;">点击选择文件，或将文件拖拽至此处</p>
                        <p style="font-size: 12px; color: var(--text-sub);">支持文档、图片、压缩包等全格式，完全存储于浏览器本地离线环境</p>
                    </div>
                    <input type="file" id="file-input" style="display: none;" onchange="handleFileUpload(event)">
                </div>
                <div class="glass-card">
                    <div class="card-header">资料存储列表</div>
                    <div id="file-list"></div>
                </div>
            </section>
        </main>
    </div>
    <script>
        // --- 1. 动态粒子背景引擎 ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() * 0.5) - 0.25;
                this.speedY = (Math.random() * 0.5) - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 229, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        for (let i = 0; i < 100; i++) particlesArray.push(new Particle());
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        // --- 2. 时钟与导航 ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        // --- 3. 文本数据持久化 (LocalStorage) ---
        let appData = JSON.parse(localStorage.getItem('techDeskData')) || { logs: [], plans: [] };
        function saveTextData() {
            localStorage.setItem('techDeskData', JSON.stringify(appData));
            updateDashboardStats();
        }
        function updateDashboardStats() {
            document.getElementById('stat-logs').innerText = appData.logs.length;
            document.getElementById('stat-plans').innerText = appData.plans.length;
            if (db) {
                const transaction = db.transaction(["files"], "readonly");
                const store = transaction.objectStore("files");
                const countRequest = store.count();
                countRequest.onsuccess = () => { document.getElementById('stat-files').innerText = countRequest.result; };
            }
        }
        function addLog() {
            const input = document.getElementById('log-input');
            if (!input.value.trim()) return;
            appData.logs.unshift({ id: Date.now(), text: input.value, date: new Date().toLocaleString() });
            input.value = '';
            saveTextData();
            renderLogs();
        }
        function addPlan() {
            const input = document.getElementById('plan-input');
            const priority = document.getElementById('plan-priority').value;
            if (!input.value.trim()) return;
            appData.plans.unshift({ id: Date.now(), text: input.value, priority: priority });
            input.value = '';
            saveTextData();
            renderPlans();
        }
        function deleteItem(type, id) {
            appData[type] = appData[type].filter(item => item.id !== id);
            saveTextData();
            if(type === 'logs') renderLogs();
            if(type === 'plans') renderPlans();
        }
        function renderLogs() {
            document.getElementById('log-list').innerHTML = appData.logs.map(log => `
                <div class="list-item">
                    <div>
                        <span style="color: var(--accent); font-size: 13px; margin-right: 15px; font-family: monospace;">[${log.date}]</span>
                        ${log.text}
                    </div>
                    <span class="delete-btn" onclick="deleteItem('logs', ${log.id})">✖ 删除</span>
                </div>
            `).join('');
        }
        function renderPlans() {
            document.getElementById('plan-list').innerHTML = appData.plans.map(plan => `
                <div class="list-item">
                    <div>
                        <span class="${plan.priority === 'urgent' ? 'tag-urgent' : 'tag-normal'}">${plan.priority === 'urgent' ? '紧急' : '普通'}</span>
                        ${plan.text}
                    </div>
                    <span class="delete-btn" onclick="deleteItem('plans', ${plan.id})">✔ 完成</span>
                </div>
            `).join('');
        }
        // --- 4. 文件持久化与下载引擎 (IndexedDB) ---
        let db;
        const dbRequest = indexedDB.open("OperatorWorkspaceDB", 1);
        dbRequest.onupgradeneeded = function(e) {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("files")) {
                database.createObjectStore("files", { keyPath: "id" });
            }
        };
        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            renderFiles();
            updateDashboardStats();
        };
        // 处理文件上传（点击或拖拽）
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) saveFileToDB(file);
        }
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) saveFileToDB(e.dataTransfer.files[0]);
        });
        // 保存文件流到数据库
        function saveFileToDB(file) {
            const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
            const transaction = db.transaction(["files"], "readwrite");
            const store = transaction.objectStore("files");
            
            const fileRecord = {
                id: Date.now(),
                name: file.name,
                size: sizeInMB + ' MB',
                type: file.type || '未知格式',
                blobData: file, // 真实文件二进制流
                uploadTime: new Date().toLocaleDateString()
            };
            const request = store.add(fileRecord);
            request.onsuccess = function() {
                renderFiles();
                updateDashboardStats();
                document.getElementById('file-input').value = ''; 
            };
            request.onerror = function() { alert("文件保存失败，超出浏览器存储限制。"); };
        }
        // 渲染文件列表
        function renderFiles() {
            if (!db) return;
            const container = document.getElementById('file-list');
            container.innerHTML = '';
            const transaction = db.transaction(["files"], "readonly");
            const store = transaction.objectStore("files");
            
            store.openCursor(null, "prev").onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    const file = cursor.value;
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'list-item';
                    itemDiv.innerHTML = `
                        <div>
                            <span style="color: var(--secondary); margin-right: 10px; font-size: 18px;">📄</span>
                            ${file.name} 
                            <span style="color: var(--text-sub); font-size: 12px; margin-left: 10px;">(${file.size} | ${file.uploadTime})</span>
                        </div>
                        <div class="action-btns">
                            <a class="download-btn" onclick="downloadFile(${file.id})">⬇ 下载文件</a>
                            <span class="delete-btn" onclick="deleteFileFromDB(${file.id})">🗑 删除</span>
                        </div>
                    `;
                    container.appendChild(itemDiv);
                    cursor.continue();
                }
            };
        }
        // 核心：无后端下载实现 (生成 Blob URL 触发真实下载)
        function downloadFile(fileId) {
            const transaction = db.transaction(["files"], "readonly");
            const store = transaction.objectStore("files");
            const request = store.get(fileId);
            request.onsuccess = function() {
                const record = request.result;
                if (!record) return;
                // 创建浏览器虚拟下载链接
                const blobUrl = URL.createObjectURL(record.blobData);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = record.name;
                document.body.appendChild(link);
                link.click();
                
                // 下载完成后释放内存
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
            };
        }
        function deleteFileFromDB(fileId) {
            const transaction = db.transaction(["files"], "readwrite");
            const store = transaction.objectStore("files");
            const request = store.delete(fileId);
            request.onsuccess = function() {
                renderFiles();
                updateDashboardStats();
            };
        }
        // --- 初始化 ---
        renderLogs();
        renderPlans();
        document.getElementById('log-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') addLog(); });
        document.getElementById('plan-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') addPlan(); });
    </script>
</body>
</html>
